app:
  name: "Facilito"
  host: "0.0.0.0"
  port: 8001

database:
  path: "data/facilito.db"

chroma:
  path: "data/chroma_db"
  collection: "facilito_practices"

chroma_local:
  path: "data/chroma_db_local"
  collection: "facilito_practices"

embedding:
  model: "paraphrase-multilingual-MiniLM-L12-v2"
  openai_model: "text-embedding-3-small"

llm:
  openai_model: "gpt-4o"
  openai_router_model: "gpt-4o-mini"
  openai_simple_model: "gpt-4o-mini"
  openai_complex_model: "gpt-4o"
  deepseek_model: "deepseek-chat"
  deepseek_router_model: "deepseek-chat"
  deepseek_simple_model: "deepseek-chat"
  deepseek_complex_model: "deepseek-reasoner"
  deepseek_base_url: "https://api.deepseek.com"

routing:
  enabled: true

agent:
  memory_size: 10
  query_rewriting: false
  hyde: false
